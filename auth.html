<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | FiberOne Internal Portal</title>
    <link rel="icon" type="image/png" href="logo/img2.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .auth-grid-transition {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0;
        }
        .auth-grid-transition.active {
            grid-template-rows: 1fr;
            opacity: 1;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Main Auth Card -->
    <div class="w-full max-w-[440px] bg-white border border-[#e2e8f0] rounded-2xl shadow-sm p-8 md:p-10">
        
        <!-- Header Branding -->
        <div class="flex flex-col items-center mb-8">
            <div class="flex items-center gap-3 mb-3">
                <img src="logo/img1.png" alt="FiberOne" class="h-7 w-auto">
                <div class="w-px h-5 bg-gray-200"></div>
                <span class="text-slate-400 font-medium tracking-[0.15em] text-[11px] uppercase">Internal Portal</span>
            </div>
            <h1 class="text-slate-500 text-[15px] font-normal">Sign in to the internal portal</h1>
        </div>

        <!-- Microsoft Auth Section -->
        <div class="space-y-4 mb-8">
            <button id="ms-btn" class="w-full flex items-center justify-between px-4 py-3 border border-[#e2e8f0] rounded-full bg-white hover:bg-gray-50 transition-all duration-200">
                <svg class="w-5 h-5 shrink-0" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 0H11V11H0V0Z" fill="#F25022"/>
                    <path d="M12 0H23V11H12V0Z" fill="#7FBA00"/>
                    <path d="M0 12H11V23H0V12Z" fill="#00A4EF"/>
                    <path d="M12 12H23V23H12V12Z" fill="#FFB900"/>
                </svg>
                <span class="text-slate-700 font-semibold text-sm">Sign in with Microsoft</span>
                <span class="text-[9px] bg-slate-100 text-slate-400 px-2 py-0.5 rounded font-bold tracking-tighter">SOON</span>
            </button>
            
            <div class="flex items-center justify-center gap-1.5">
                <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                <p class="text-xs text-slate-400">Only @fob.ng company emails are allowed.</p>
            </div>
        </div>

        <!-- Segmented Toggle -->
        <div class="relative flex p-1 bg-[#f1f5f9] rounded-xl mb-8">
            <div id="tab-highlight" class="absolute top-1 left-1 w-[calc(50%-4px)] h-[calc(100%-8px)] bg-white rounded-lg shadow-sm transition-transform duration-300"></div>
            <button id="login-tab" class="relative z-10 flex-1 py-2 text-sm font-bold text-[#0f172a] transition-colors">Log in</button>
            <button id="signup-tab" class="relative z-10 flex-1 py-2 text-sm font-bold text-slate-400 transition-colors">Sign up</button>
        </div>

        <!-- Auth Form -->
        <form id="auth-form" class="space-y-5">
            <!-- Full Name (Hidden by default) -->
            <div id="name-container" class="auth-grid-transition">
                <div class="overflow-hidden">
                    <label class="block text-sm font-bold text-[#0f172a] mb-2">Full name</label>
                    <div class="bg-[#f8fafc] border border-gray-100 rounded-xl px-4 py-3 focus-within:border-blue-200 transition-all">
                        <input id="input-name" type="text" placeholder="Jane Doe" class="w-full bg-transparent border-none outline-none text-sm text-slate-900 placeholder:text-slate-400">
                    </div>
                </div>
            </div>

            <!-- Department (Visible on Signup) -->
            <div id="dept-container" class="auth-grid-transition">
                <div class="overflow-hidden">
                    <label class="block text-sm font-bold text-[#0f172a] mb-2">Department</label>
                    <div class="bg-[#f8fafc] border border-gray-100 rounded-xl px-4 py-3 focus-within:border-blue-200 transition-all">
                        <select id="input-dept" class="w-full bg-transparent border-none outline-none text-sm text-slate-900 appearance-none cursor-pointer">
                            <option value="" disabled selected>Loading departments...</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Gender (Visible on Signup) -->
            <div id="gender-container" class="auth-grid-transition">
                <div class="overflow-hidden">
                    <label class="block text-sm font-bold text-[#0f172a] mb-2">Gender</label>
                    <div class="bg-[#f8fafc] border border-gray-100 rounded-xl px-4 py-3 focus-within:border-blue-200 transition-all">
                        <select id="input-gender" class="w-full bg-transparent border-none outline-none text-sm text-slate-900 appearance-none cursor-pointer">
                            <option value="" disabled selected>Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-bold text-[#0f172a] mb-2">Work email</label>
                <div class="bg-[#f8fafc] border border-gray-100 rounded-xl px-4 py-3 focus-within:border-blue-200 transition-all">
                    <input id="input-email" type="email" placeholder="you@fob.ng" class="w-full bg-transparent border-none outline-none text-sm text-slate-900 placeholder:text-slate-400">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-bold text-[#0f172a] mb-2">Password</label>
                <div class="bg-[#f8fafc] border border-gray-100 rounded-xl px-4 py-3 focus-within:border-blue-200 transition-all">
                    <input id="input-password" type="password" placeholder="••••••••" class="w-full bg-transparent border-none outline-none text-sm text-slate-900 placeholder:text-slate-400">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submit-btn" class="w-full bg-[#0f172a] hover:bg-slate-800 text-white font-bold py-4 rounded-full transition-all duration-300 text-sm mt-2 shadow-lg shadow-slate-200">
                <span id="submit-btn-text">Sign in</span>
            </button>
        </form>
    </div>

    <!-- Footer -->
    <footer class="mt-8">
        <p class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold text-center">
            Internal use only · Fiber One Broadband employees
        </p>
    </footer>

    <script>
        // ─────────────────────────────────────────────────────────────────────
        // GAS SAFETY WRAPPER
        // google.script.run only exists when served through Google Apps Script.
        // When the file is opened locally (file:// or localhost), it's undefined
        // and every call to it throws "google is not defined", freezing the UI.
        // This wrapper detects that and uses mock responses for local testing.
        // ─────────────────────────────────────────────────────────────────────
        var GAS_READY = (function() {
            try { return typeof google !== 'undefined' && !!google.script && !!google.script.run; }
            catch(e) { return false; }
        })();

        // scriptUrl is injected by the GAS template engine at serve time.
        // If we're running locally it won't exist, so default to empty string.
        var SCRIPT_URL = (function() {
            try { return typeof scriptUrl !== 'undefined' ? scriptUrl : ''; }
            catch(e) { return ''; }
        })();

        // ─────────────────────────────────────────────────────────────────────
        // SAFE CALL — wraps google.script.run so it never throws locally
        // ─────────────────────────────────────────────────────────────────────
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw4tb8ahqX7bCs_MnPyblmz-Ke8h9CIlk_BMwGF9NbuHwr3n5sPT0pcpagg1DX57U2x/exec";

        function gasCall(fnName, args, onSuccess, onError) {
        // If running inside Google Apps Script
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run
                .withSuccessHandler(onSuccess)
                .withFailureHandler(onError || console.error)[fnName](...args);
            return;
        }

        // If running on LOCAL HOST, use FETCH to sync with the Web App URL
        const payload = {
            action: fnName,
            args: args
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // GAS requires no-cors for cross-domain POST from local
            body: JSON.stringify(payload)
        })
        .then(() => {
            // Because GAS doesn't return body in no-cors, we do a secondary GET to get results
            // or we use a JSONP approach. For simplicity in syncing:
            return fetch(`${WEB_APP_URL}?action=${fnName}&data=${encodeURIComponent(JSON.stringify(args))}`);
        })
        .then(response => response.json())
        .then(res => onSuccess(res))
        .catch(err => {
            if (onError) onError(err);
            console.error("Sync Error:", err);
        });
        }

        // ─────────────────────────────────────────────────────────────────────
        // UI ELEMENTS
        // ─────────────────────────────────────────────────────────────────────
        var loginTab      = document.getElementById('login-tab');
        var signupTab     = document.getElementById('signup-tab');
        var tabHighlight  = document.getElementById('tab-highlight');
        var nameContainer = document.getElementById('name-container');
        var submitBtn     = document.getElementById('submit-btn');
        var submitBtnText = document.getElementById('submit-btn-text');
        var authForm      = document.getElementById('auth-form');
        var msBtn         = document.getElementById('ms-btn');

        // ─────────────────────────────────────────────────────────────────────
        // TOAST
        // ─────────────────────────────────────────────────────────────────────
        function showToast(message, type) {
            type = type || 'error';
            var toast = document.createElement('div');
            toast.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-xs font-medium shadow-xl z-50 transition-all duration-300 transform translate-y-2 opacity-0 text-white ' +
                (type === 'error' ? 'bg-red-600' : 'bg-slate-900');
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(function() { toast.classList.remove('translate-y-2', 'opacity-0'); }, 10);
            setTimeout(function() {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        // ─────────────────────────────────────────────────────────────────────
        // TAB TOGGLE
        // ─────────────────────────────────────────────────────────────────────
        function toggleTab(mode) {
            if (mode === 'signup') {
                tabHighlight.style.transform = 'translateX(100%)';
                signupTab.className  = signupTab.className.replace('text-slate-400', 'text-[#0f172a]');
                loginTab.className   = loginTab.className.replace('text-[#0f172a]', 'text-slate-400');
                nameContainer.classList.add('active');
                document.getElementById('dept-container').classList.add('active');
                document.getElementById('gender-container').classList.add('active');
                submitBtnText.innerText = 'Create account';
            } else {
                tabHighlight.style.transform = 'translateX(0)';
                loginTab.className   = loginTab.className.replace('text-slate-400', 'text-[#0f172a]');
                signupTab.className  = signupTab.className.replace('text-[#0f172a]', 'text-slate-400');
                nameContainer.classList.remove('active');
                document.getElementById('dept-container').classList.remove('active');
                document.getElementById('gender-container').classList.remove('active');
                submitBtnText.innerText = 'Sign in';
            }
        }

        loginTab.addEventListener('click',  function() { toggleTab('login');  });
        signupTab.addEventListener('click', function() { toggleTab('signup'); });

        // Fetch Departments and Domain on Load
        window.onload = function() {
            // Get allowed domain for display
            gasCall('getDomainConfig', [], res => {
                if (res.success) {
                    const textXs = document.querySelector('.auth-grid-transition + div .text-xs') || document.querySelector('p.text-xs.text-slate-400');
                    if (textXs) textXs.innerText = `Only ${res.domain} company emails are allowed.`;
                    document.getElementById('input-email').placeholder = `you${res.domain}`;
                }
            });

            // Get departments for signup dropdown
            gasCall('getPublicDepartments', [], res => {
                if (res.success) {
                    document.getElementById('input-dept').innerHTML = '<option value="" disabled selected>Select Department</option>' + res.data.map(name => `<option value="${name}">${name}</option>`).join('');
                }
            });
        };

        // ─────────────────────────────────────────────────────────────────────
        // FORM SUBMIT
        // ─────────────────────────────────────────────────────────────────────
        authForm.addEventListener('submit', function(e) {
            e.preventDefault();

            var name      = document.getElementById('input-name').value.trim();
            var dept      = document.getElementById('input-dept').value;
            var gender    = document.getElementById('input-gender').value;
            var email     = document.getElementById('input-email').value.toLowerCase().trim();
            var password  = document.getElementById('input-password').value;
            var isSignup  = submitBtnText.innerText === 'Create account';

            // ── Validation ──────────────────────────────────────────────────
            if (!email) { showToast('Email is required.'); return; }
            
            // Use the dynamically fetched domain for validation
            const allowedDomainElement = document.querySelector('.auth-grid-transition + div .text-xs');
            const allowedDomainText = allowedDomainElement ? allowedDomainElement.innerText : '';
            const currentAllowedDomain = allowedDomainText.match(/@[\w.]+/);
            if (currentAllowedDomain && !email.endsWith(currentAllowedDomain[0])) {
                showToast(`Please use an official ${currentAllowedDomain[0]} email address.`);
                return;
            }

            // System accounts for password-less testing
            const systemAccounts = ['mec-test@fob.ng', 'project-test@fob.ng', 'planning-test@fob.ng', 'sd-test@fob.ng'];
            const isSystemAccount = systemAccounts.includes(email);

            if (!isSystemAccount && password.length < 4) {
                showToast('Password must be at least 4 characters.');
                return;
            }

            if (isSignup && !name) {
                showToast('Full name is required.');
                return;
            }
            if (isSignup && !dept) { showToast('Please select a department.'); return; }
            if (isSignup && !gender) { showToast('Please select gender.'); return; }

            // ── Lock UI ─────────────────────────────────────────────────────
            var originalText    = submitBtnText.innerText;
            submitBtnText.innerText = 'Processing...';
            submitBtn.disabled  = true;

            // ── Handlers ────────────────────────────────────────────────────
            function onSuccess(res) {
                submitBtn.disabled = false;

                if (isSignup) {
                    // Registration always succeeds if the server didn't throw.
                    // The new backend returns { success: true } on register.
                    showToast('Account created! Please sign in.', 'success');
                    toggleTab('login');
                    submitBtnText.innerText = 'Sign in';
                    return;
                }

                // ── Login response ───────────────────────────────────────────
                if (!res || !res.success) {
                    showToast(res && res.message ? res.message : 'Login failed. Check your credentials.');
                    submitBtnText.innerText = originalText;
                    return;
                }

                // Store session token for use in other pages
                try {
                    sessionStorage.setItem('sd_token', res.token  || '');
                    sessionStorage.setItem('sd_role',  res.role   || '');
                    sessionStorage.setItem('sd_name',  res.name   || '');
                    sessionStorage.setItem('sd_department', res.department || '');
                    sessionStorage.setItem('sd_gender', res.gender || '');
                    sessionStorage.setItem('sd_notes', res.notes || '');
                    sessionStorage.setItem('sd_email', email);
                } catch(storageErr) { /* sessionStorage blocked in some iframe contexts */ }

                var target = (res.role === 'admin' || res.role === 'super admin') ? 'admin' : 'employee';
                var currentScriptUrl = (typeof scriptUrl !== 'undefined') ? scriptUrl : '';
                var isGasEnv = currentScriptUrl.indexOf('https://script.google.com') !== -1;

                if (isGasEnv) {
                    // Production: force top-level redirect to escape the GAS iframe
                    var dest = currentScriptUrl + '?page=' + target + '&userEmail=' + encodeURIComponent(email);
                    try { window.top.location.href = dest; }
                    catch(iframeErr) { window.location.href = dest; }
                } else {
                    window.location.href = target + '.html?userEmail=' + encodeURIComponent(email);
                }
            }

            function onError(err) {
                submitBtn.disabled      = false;
                submitBtnText.innerText = originalText;
                var msg = (err && err.message) ? err.message : 'Connection failed. Please try again.';
                showToast(msg);
            }

            // ── Fire the call ────────────────────────────────────────────────
            if (isSignup) {
                gasCall('registerUser', [name, email, password, dept, gender], onSuccess, onError);
            } else {
                gasCall('loginUser', [email, password], onSuccess, onError);
            }
        });

        // ── Microsoft SSO (staging) ──────────────────────────────────────────
        msBtn.addEventListener('click', function() {
            showToast('Microsoft SSO is in staging. Use email login for now.', 'success');
        });
    </script>

    <!-- GAS injects the real script URL here at serve time.
         When running locally this block is harmless — SCRIPT_URL stays ''. -->
    <script>var scriptUrl = "<?= scriptUrl ?>";</script>

</body>
</html>
